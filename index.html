<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STEP | Scan QR Code</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a1120;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            padding: 20px;
            position: relative;
        }

        .bg-glow {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #0a1120;
        }
        .bg-glow::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(216, 180, 106, 0.07), transparent 70%);
            top: -150px;
            right: -100px;
            border-radius: 50%;
        }
        .bg-glow::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(74, 141, 183, 0.05), transparent 70%);
            bottom: -100px;
            left: -100px;
            border-radius: 50%;
        }

        .card {
            width: 420px;
            max-width: 100%;
            background: rgba(12, 22, 42, 0.90);
            backdrop-filter: blur(30px);
            border-radius: 40px;
            border: 1px solid rgba(216, 180, 106, 0.08);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            padding: 40px 30px 32px;
            color: #fff;
            position: relative;
            z-index: 2;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-3px); }

        .accent {
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #d8b46a, #f0d68a);
            border-radius: 10px;
            margin: 0 auto 16px;
        }

        /* ✅ LOGO FIX - Proper path */
        .logo {
            height: 100px;
            width: auto;
            display: block;
            margin: 0 auto 6px;
            filter: drop-shadow(0 8px 30px rgba(0, 0, 0, 0.3));
        }

        .qr-box {
            width: 180px;
            height: 180px;
            background: #fff;
            border-radius: 20px;
            padding: 12px;
            margin: 20px auto 16px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }
        .qr-box:hover { transform: scale(1.02); }
        .qr-box img { width: 100%; height: 100%; border-radius: 12px; display: block; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #d8b46a;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 15px;
            color: #0a1428;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 10px 35px rgba(216, 180, 106, 0.15);
        }
        .btn:hover {
            background: #e8c77a;
            transform: translateY(-2px);
            box-shadow: 0 15px 45px rgba(216, 180, 106, 0.25);
        }
        .btn:active { transform: scale(0.97); }
        .btn i { font-size: 16px; }

        .info {
            font-size: 12px;
            color: #6a7a8e;
            margin-top: 12px;
        }
        .info i { color: #d8b46a; margin-right: 4px; }

        .profile {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255, 255, 255, 0.03);
            padding: 14px 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin-top: 26px;
            text-align: left;
            transition: background 0.3s ease;
        }
        .profile:hover { background: rgba(255, 255, 255, 0.05); }

        .avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: rgba(216, 180, 106, 0.10);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #d8b46a;
            border: 1.5px solid rgba(216, 180, 106, 0.10);
            flex-shrink: 0;
        }

        .profile .text h4 { font-size: 17px; font-weight: 700; }
        .profile .text .role { font-size: 13px; color: #d8b46a; font-weight: 500; }
        .profile .text .org { font-size: 12px; color: #7a8ba0; margin-top: 1px; }
        .profile .text .org i { margin-right: 4px; font-size: 11px; color: #d8b46a; opacity: 0.5; }

        .footer {
            margin-top: 26px;
            padding-top: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        .footer .label { font-size: 10px; letter-spacing: 3px; color: #4a5a6a; text-transform: uppercase; }
        .footer .brand {
            color: #d8b46a;
            font-weight: 700;
            letter-spacing: 3px;
            font-size: 13px;
            display: block;
            margin-top: 3px;
        }
        .footer .brand .dot { font-size: 4px; margin: 0 8px; vertical-align: middle; color: #d8b46a; }

        @media (max-width: 480px) {
            .card { padding: 30px 18px 26px; border-radius: 32px; }
            .qr-box { width: 150px; height: 150px; padding: 10px; }
            .logo { height: 80px; }
            .btn { padding: 12px 28px; font-size: 14px; width: 100%; justify-content: center; }
            .profile { padding: 12px 16px; gap: 14px; }
            .avatar { width: 46px; height: 46px; font-size: 22px; }
            .profile .text h4 { fontSize: 15px; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="card">

        <div class="accent"></div>

        <!-- ✅ LOGO - Proper path with space -->
        <img src="logo wires and cable.png" alt="STEP" class="logo" />

        <div class="qr-box">
            <img id="qrImage" src="" alt="QR" />
        </div>

        <button class="btn" onclick="openFullCard()">
            <i class="fa-solid fa-qrcode"></i> Scan to Open
        </button>
        <div class="info"><i class="fa-solid fa-mobile-screen-button"></i> QR code scan karein</div>

        <div class="profile">
            <div class="avatar"><i class="fa-solid fa-user-tie"></i></div>
            <div class="text">
                <h4>Mr. Sumit Tayal</h4>
                <div class="role">Director</div>
                <div class="org"><i class="fas fa-building"></i> STEP Wires &amp; Cables</div>
            </div>
        </div>

        <div class="footer">
            <div class="label">Powered by</div>
            <div class="brand"><span class="dot">●</span> STEP WIRES &amp; CABLES <span class="dot">●</span></div>
        </div>

    </div>

    <script>
        function generateQRCode() {
            const baseUrl = window.location.origin + window.location.pathname.replace('index.html', '');
            const fullCardUrl = baseUrl + 'card.html';
            const qrImage = document.getElementById('qrImage');
            qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(fullCardUrl)}&bgcolor=ffffff&color=0a1a2f&margin=20`;
        }

        function openFullCard() {
            const baseUrl = window.location.origin + window.location.pathname.replace('index.html', '');
            window.location.href = baseUrl + 'card.html';
        }

        window.onload = generateQRCode;
    </script>

</body>
</html>
